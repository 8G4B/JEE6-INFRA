services:
  mariadb:
    image: mariadb:10.11
    container_name: jee6-mariadb
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./env/db.env
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: jee6-redis
    restart: unless-stopped
    network_mode: host
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../apps/JEE6-API
      dockerfile: dockerfile
      network: host
    container_name: jee6-api
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./env/api.env
    environment:
      - REDIS_URL=redis://127.0.0.1:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6974/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  llm:
    build:
      context: ../apps/JEE6-LLM
      dockerfile: dockerfile
      network: host
    container_name: jee6-llm
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./env/llm.env
    entrypoint: []
    command: >
      sh -c "vllm serve $${MODEL_NAME} --host 0.0.0.0 --port $${PORT}
      --gpu-memory-utilization 0.95 --max-model-len 4096 --quantization awq_marlin --enforce-eager"
    volumes:
      - llm_data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  filter:
    build:
      context: ../apps/JEE6-FILTER
      dockerfile: dockerfile
      network: host
    container_name: jee6-filter
    restart: unless-stopped
    network_mode: host
    volumes:
      - filter_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6975/health')"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s

  bot:
    build:
      context: ../apps/JEE6.v1
      dockerfile: dockerfile
      network: host
    container_name: jee6-bot
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./env/bot.env
    environment:
      - DB_HOST=127.0.0.1
      - DB_PORT=3306
      - VLLM_BASE_URL=http://127.0.0.1:10000/v1
      - API_GATEWAY_URL=http://127.0.0.1:6974
      - FILTER_API_URL=http://127.0.0.1:6975
    depends_on:
      mariadb:
        condition: service_healthy
      api:
        condition: service_healthy
      filter:
        condition: service_healthy

volumes:
  mariadb_data:
    driver: local
  llm_data:
    driver: local
  redis_data:
    driver: local
  filter_data:
    driver: local
