services:
  mariadb:
    image: mariadb:10.11
    container_name: jee6-mariadb
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./env/db.env
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  llm:
    build:
      context: ../apps/JEE6-LLM
      dockerfile: dockerfile
      network: host
    container_name: jee6-llm
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./env/llm.env
    entrypoint: []
    command: >
      sh -c "vllm serve $${MODEL_NAME} --host 0.0.0.0 --port $${PORT}
      --gpu-memory-utilization 0.90 --max-model-len 4096 --quantization awq"
    volumes:
      - llm_data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  bot:
    build:
      context: ../apps/JEE6.v1
      dockerfile: dockerfile
      network: host
    container_name: jee6-bot
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./env/bot.env
    environment:
      - DB_HOST=127.0.0.1
      - DB_PORT=3306
      - VLLM_BASE_URL=http://127.0.0.1:10000/v1
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data:
    driver: local
  llm_data:
    driver: local
